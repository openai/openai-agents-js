name: Deploy StormScope

on:
  push:
    branches:
      - main
      - claude/setup-stormscope-repo-zp5fQ
    paths:
      - 'examples/stormscope/**'
      - '.github/workflows/deploy-stormscope.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build StormScope
        run: pnpm build
        working-directory: examples/stormscope
        env:
          GITHUB_ACTIONS: 'true'

      - name: Add SPA 404 fallback
        run: cp examples/stormscope/dist/index.html examples/stormscope/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: examples/stormscope/dist
          destination_dir: stormscope
          commit_message: 'deploy: stormscope ${{ github.sha }}'
