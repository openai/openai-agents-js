packages:
  - packages/*
  - examples/*
  - docs

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - cbor-extract
  - esbuild
  - protobufjs
  - sharp
  # used only in examples/memory
  - '@prisma/client'
  - '@prisma/engines'
  - 'prisma'

publishBranch: main
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@blaxel/core'
blockExoticSubdeps: true
strictDepBuilds: true
